<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harga Promo Katalog</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background: #1f8e03;
    color: white;
    text-align: center;
    padding: 12px;
    font-size: 18px;
    font-weight: bold;
}

/* CONTROL AREA */
.control {
    padding: 10px;
    background: white;
    position: sticky;
    top: 0;
    z-index: 10;
}

select {
    width: 100%;
    padding: 10px;
    font-size: 16px;
}

/* CONTENT FULL WIDTH */
#content {
    width: 100%;
}

/* IMAGE RESPONSIVE */
img {
    width: 100%;
    height: auto;
    display: block;
}
</style>
</head>

<body>

<div class="header">
Harga Promo Katalog
</div>

<div class="control">
<select id="promo">
    <option value="midiweek">Alfamidi Hemat Satu Pekan</option>
<option value="midimom">Alfamidi Senin Kamis</option>

<option value="alfa">Alfamart</option>

<option value="aeon">Aeon</option>

<option value="brastagi">Brastagi</option>
<option value="care">Carefour</option>
<option value="careweek">Carefour Senin Kamis</option>
<option value="family">FamilyMart</option>
<option value="farmer">Farmers Market</option>
<option value="farmerweek">Farmers Market Senin Kamis</option>
<option value="guardianweek">Guardian Senin Kamis</option>
<option value="guar">Guardian Lebih Hemat</option>
<option value="guard">Guardian Katalog</option>
<option value="grand">GrandLucky</option>
<option value="hyper">Hypermart</option>
<option value="hyperweek">Hypermart Senin Kamis</option>
<option value="hari">Hari Hari Pasar Swalayan</option>
<option value="hariweek">Hari Hari Pasar Swalayan Senin Kamis</option>
<option value="indo">Indomaret</option>
<option value="indogaji">Indomaret Promo Mingguan</option>
<option value="indoweek">Indomaret Senin Kamis</option>
<option value="indoheboh">Indomaret Promo Heboh</option>

<option value="lulu">Lulu Supermarket</option>
<option value="luluweek">Lulu Supermarket Senin Kamis</option>
<option value="lottemart">LotteMart</option>

<option value="maxi">Maximart</option>
<option value="naga">Naga Swalayan</option>
<option value="oriflame">Oriflame</option>
<option value="smarco">Smarco Supermarket</option>

<option value="hall">TheFoodHall</option>

</select>
</div>

<div id="content"></div>

<script src="https://iljovitadev.pages.dev/katalo94/data.js"></script>

<script>
const select = document.getElementById("promo");
const container = document.getElementById("content");

// fungsi tampilkan gambar
function tampilkan(promo) {
    container.innerHTML = "";

    const list = data[promo] || data["default"];

    list.forEach(function(url) {
        const img = document.createElement("img");
        img.src = url;
        container.appendChild(img);
    });
}

tampilkan("default");

select.addEventListener("change", function() {
    tampilkan(this.value);
});
</script>

</body>
</html>
