<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Harga Promo Katalog</title>
	<link rel="stylesheet" href="style.css">

	<script>
	let data = {};
	</script>

	<script src="https://katal094.pages.dev/data.js"></script>

	<script>
function showgrafik() {
    const promo = document.getElementById("promo").value;

    const container = document.getElementById("qwerty");
    const link = document.getElementById("link");

    // ubah link zoom
    link.href = "zoom.html?promo=" + promo;

    container.innerHTML = "";

    if (!promo || !data[promo]) return;

    data[promo].forEach(function(img) {
        container.innerHTML += `
            <img src="${img}" style="width:100%; margin-bottom:10px;">
        `;
    });
}

window.onload = function() {
    // auto load kalau ada ?promo=
    const urlParams = new URLSearchParams(window.location.search);
    const promo = urlParams.get("promo");

    if (promo) {
        document.getElementById("promo").value = promo;
        showgrafik();
    }
};
	</script>
</head>
