<!-- ✅ ambil data -->
<script src="data.js"></script>

<script>
const select = document.getElementById("promo");
const container = document.getElementById("content");

// tampilkan gambar
function tampilkan(promo) {
    console.log("PROMO:", promo);
    console.log("DATA:", data);

    container.innerHTML = "";

    if (!promo || !data[promo]) {
        container.innerHTML = "<p style='color:red'>Data tidak ditemukan</p>";
        return;
    }

    data[promo].forEach(function(url) {
        const img = document.createElement("img");
        img.src = url;
        container.appendChild(img);
    });
}

// event dropdown
select.addEventListener("change", function() {
    tampilkan(this.value);
});

// auto load dari URL (?promo=...)
const params = new URLSearchParams(window.location.search);
const promo = params.get("promo");

if (promo) {
    select.value = promo;
    tampilkan(promo);
}
</script>
